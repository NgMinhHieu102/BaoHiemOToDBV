databases:
  - name: dbv-insurance-db
    plan: free
    databaseName: dbv_insurance
    user: dbv_user
    ipAllowList: []

services:
  - type: web
    name: dbv-insurance-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dbv-insurance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
